appId: com.krunkercivilian.client
productName: Krunker Civilian Client
directories:
  output: out
  buildResources: build
files:
  - dist/**/*
  - node_modules/electron-store/**/*
  - node_modules/conf/**/*
  - node_modules/dot-prop/**/*
  - node_modules/type-fest/**/*
  - node_modules/pkg-up/**/*
  - node_modules/find-up/**/*
  - node_modules/locate-path/**/*
  - node_modules/p-locate/**/*
  - node_modules/p-limit/**/*
  - node_modules/yocto-queue/**/*
  - node_modules/path-exists/**/*
  - node_modules/env-paths/**/*
  - node_modules/json-schema-typed/**/*
  - node_modules/ajv/**/*
  - node_modules/ajv-formats/**/*
  - node_modules/atomically/**/*
  - node_modules/debounce-fn/**/*
  - node_modules/mimic-fn/**/*
  - node_modules/semver/**/*
  - node_modules/onetime/**/*
  - "!node_modules/**/*.ts"
  - "!node_modules/**/*.map"
asar: true

win:
  target:
    - target: nsis
      arch: [x64]
    - target: portable
      arch: [x64]
  icon: build/icon.ico

nsis:
  oneClick: false
  allowToChangeInstallationDirectory: true
  createDesktopShortcut: true
  createStartMenuShortcut: true
  shortcutName: Krunker Civilian Client
  artifactName: "${productName}-${version}-Setup.${ext}"

portable:
  artifactName: "${productName}-${version}-Portable.${ext}"

linux:
  target:
    - target: AppImage
      arch: [x64]
    - target: deb
      arch: [x64]
  icon: build/icon.png
  category: Game
  artifactName: "${productName}-${version}-linux-${arch}.${ext}"
  desktop:
    entry:
      Name: Krunker Civilian Client
      Comment: Cross-platform Krunker game client
      Categories: Game;ActionGame;
      Keywords: krunker;fps;game;
      StartupWMClass: krunker-civilian-client

publish:
  provider: github
  owner: bigjakk
  repo: Krunker-Civilian-Client
